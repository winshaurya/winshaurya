name: Auto-Update Merged PRs

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PRs and Build Scaled Table
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            console.log("Fetching PRs for author:winshaurya...");
            
            // Your exact exclusions are maintained here
            const query = 'is:pr author:winshaurya is:merged is:public -repo:Parth-Gupta-github/FloatNote -repo:winshaurya/internshipPortal -repo:ParvTiwari/MetroMart';
            
            const result = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 6
            });

            console.log(`Found ${result.data.items.length} merged PRs.`);
            
            if (result.data.items.length === 0) {
              console.log("No PRs found. Skipping README update.");
              return;
            }

            const mergeIconBase64 = "PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiIgd2lkdGg9IjE2IiBoZWlnaHQ9IjE2IiBmaWxsPSJ3aGl0ZSI%%2BPC9zdmc%2B";

            let table = `<div align="center">\n  <table align="center" style="border-collapse: collapse;">\n    <thead>\n      <tr>\n        <th align="left" width="250">Organization</th>\n        <th align="left" width="400">Repository & Pull Request</th>\n        <th align="center" width="150">Status</th>\n        <th align="center" width="150">Tech Stack</th>\n      </tr>\n    </thead>\n    <tbody>\n`;

            for (const issue of result.data.items) {
              const repoUrlParts = issue.repository_url.split('/');
              const owner = repoUrlParts[repoUrlParts.length - 2];
              const repoName = repoUrlParts[repoUrlParts.length - 1];

              let orgName = owner;
              try {
                const orgData = await github.rest.users.getByUsername({ username: owner });
                orgName = orgData.data.name || owner;
              } catch (e) {
                console.log(`Could not fetch org for ${owner}`);
              }

              let lang = 'Code';
              try {
                const repo = await github.rest.repos.get({ owner, repo: repoName });
                lang = repo.data.language || 'Code';
              } catch (e) {
                console.log(`Could not fetch language for ${repoName}`);
              }

              const safeLang = encodeURIComponent(lang);
              const cleanTitle = issue.title.replace(/</g, '&lt;').replace(/>/g, '&gt;');

              table += `<tr><td align="left" valign="middle"><a href="https://github.com/${owner}" style="text-decoration:none;color:inherit;"><img src="https://github.com/${owner}.png" width="45" style="border-radius:6px;vertical-align:middle;" alt="${orgName}"><span style="font-size:16px;"><b>&nbsp;${orgName}</b></span></a></td><td align="left" valign="middle"><a href="${issue.html_url}" style="font-size:16px;"><b>${owner} / ${repoName}</b></a><br><i style="font-size:14px;color:gray;">${cleanTitle}</i></td><td align="center" valign="middle"><a href="${issue.html_url}"><img src="https://img.shields.io/badge/Merged-8250DF?style=flat&logo=data:image/svg+xml;base64,${mergeIconBase64}&logoColor=white" height="32" alt="Merged"></a></td><td align="center" valign="middle"><img src="https://img.shields.io/badge/${safeLang}-555555?style=flat&logo=${lang.toLowerCase()}&logoColor=white" height="32" alt="${lang}"></td></tr>\n`;
            }

            table += `    </tbody>\n  </table>\n</div>`;

            const readme = fs.readFileSync('README.md', 'utf8');

            // 1. Locate the heading (checks for either ### or #)
            let targetHeading = '### Contributions';
            let startIndex = readme.indexOf(targetHeading);

            if (startIndex === -1) {
              targetHeading = '# Contributions';
              startIndex = readme.indexOf(targetHeading);
            }

            if (startIndex === -1) {
              console.error("ERROR: Neither '### Contributions' nor '# Contributions' was found in the README.");
              return;
            }

            // 2. Find where the current section ends (looks for the next Markdown heading)
            let searchStartIndex = startIndex + targetHeading.length;
            let endIndex = readme.indexOf('\n#', searchStartIndex);

            // If no other headings exist below this, we replace down to the end of the file
            if (endIndex === -1) {
              endIndex = readme.length;
            }

            // 3. Slice the file contents
            const before = readme.substring(0, startIndex);
            const after = readme.substring(endIndex);

            // 4. Construct the final README
            const newReadme = `${before}${targetHeading}\n\n${table}\n${after}`;

            fs.writeFileSync('README.md', newReadme);
            console.log("README successfully updated using dynamic heading replacement!");

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update merged PRs safely"
