name: Auto-Update Merged PRs

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PRs and Build Scaled Table
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            console.log("Fetching PRs for author:winshaurya...");
            const query = 'is:pr author:winshaurya is:merged is:public';
            const result = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 6
            });

            console.log(`Found ${result.data.items.length} merged PRs.`);
            
            if (result.data.items.length === 0) {
              console.log("No PRs found. Skipping README update.");
              return;
            }

            const mergeIconBase64 = "PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiIgd2lkdGg9IjE2IiBoZWlnaHQ9IjE2IiBmaWxsPSJ3aGl0ZSI%%2BPC9zdmc%2B";

            // ...keep the rest of your JavaScript exactly as it is...

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update merged PRs (1.5x scaled table layout)"
