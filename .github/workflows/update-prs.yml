name: Auto-Update Merged PRs
on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PRs and Build Table
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Searches for your public merged PRs
            const query = 'is:pr author:winshaurya is:merged is:public';
            const result = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 5 });
            
            let table = `<div align="center">\n  <table align="center">\n    <tr>\n      <th align="center">Status</th>\n      <th align="center">Organization</th>\n      <th align="center">Repository & PR</th>\n      <th align="center">Language</th>\n    </tr>\n`;
            
            for (const issue of result.data.items) {
              // Extract owner and repo name from the URL
              const repoUrlParts = issue.repository_url.split('/');
              const owner = repoUrlParts[repoUrlParts.length - 2];
              const repoName = repoUrlParts[repoUrlParts.length - 1];
              
              // Fetch repo details to get the primary language
              const repo = await github.rest.repos.get({ owner, repo: repoName });
              const lang = repo.data.language || 'Code';
              const safeLang = encodeURIComponent(lang);
              const cleanTitle = issue.title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
              
              // Construct the HTML row
              table += `    <tr>
                  <td align="center"><img src="https://img.shields.io/badge/-Merged-8250DF?style=flat-square&logo=git-merge&logoColor=white" width="80" alt="Merged"></td>
                  <td align="center"><a href="https://github.com/${owner}"><img src="https://github.com/${owner}.png" width="35" style="border-radius: 50%;" alt="${owner}"></a></td>
                  <td><a href="${issue.html_url}"><b>${owner} / ${repoName}</b></a><br><i>${cleanTitle}</i></td>
                  <td align="center"><img src="https://img.shields.io/badge/${safeLang}-555555?style=flat-square&logo=${lang.toLowerCase()}&logoColor=white" alt="${lang}"></td>
                </tr>\n`;
            }
            table += `  </table>\n</div>`;
            
            // Read the current README and replace the section
            const readme = fs.readFileSync('README.md', 'utf8');
            const newReadme = readme.replace(
              /[\s\S]*/,
              `\n${table}\n`
            );
            fs.writeFileSync('README.md', newReadme);

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: dynamically update merged PRs"
